name: Link Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  internal-links:
    name: Internal links
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check internal links and assets
        run: python3 scripts/check-internal-links.py
